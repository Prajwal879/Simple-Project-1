name: Autonomous Daily DevOps Builder

on:
  schedule:
    # 03:30 UTC is 09:00 India Standard Time.
    - cron: "30 3 * * *"
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  build-and-report:
    if: >-
      github.event_name != 'issue_comment' ||
      (github.event.comment.user.login == github.repository_owner &&
      (contains(github.event.comment.body, 'approve') ||
      contains(github.event.comment.body, 'Approve') ||
      contains(github.event.comment.body, 'APPROVE')))
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Test the agent and repository
        run: python -m unittest discover -s tests -v

      - name: Close the approved update
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Approval received. Starting the next project now. 🚀"

      - name: Complete today's task
        id: task
        shell: bash
        run: |
          python auto_builder.py | tee task-output.txt
          cat task-output.txt >> "$GITHUB_OUTPUT"

      - name: Commit completed work directly
        env:
          TASK_DATE: ${{ steps.task.outputs.TASK_DATE }}
          TASK_TITLE: ${{ steps.task.outputs.TASK_TITLE }}
        shell: bash
        run: |
          rm task-output.txt
          git config user.name "daily-devops-builder[bot]"
          git config user.email "daily-devops-builder[bot]@users.noreply.github.com"
          git add completed-work
          git commit -m "feat: complete ${TASK_TITLE} for ${TASK_DATE}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Send morning work update through GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          TASK_DATE: ${{ steps.task.outputs.TASK_DATE }}
          TASK_TITLE: ${{ steps.task.outputs.TASK_TITLE }}
          TASK_SUMMARY: ${{ steps.task.outputs.TASK_SUMMARY }}
          TASK_PATH: ${{ steps.task.outputs.TASK_PATH }}
        shell: bash
        run: |
          gh issue create \
            --title "Simple-Project-1 update: ${TASK_TITLE} completed" \
            --assignee "${{ github.repository_owner }}" \
            --body "Hi Prajwal,\n\nToday's work is complete.\n\n**Repository:** Simple-Project-1\n**Project completed:** ${TASK_TITLE}\n**Details:** ${TASK_SUMMARY}\n**Files:** [Open the completed project](https://github.com/${{ github.repository }}/tree/${{ github.event.repository.default_branch }}/${TASK_PATH})\n**Tests:** All automated tests passed.\n**Date:** ${TASK_DATE}\n\nWhat should I do next?\n\n1. Reply **APPROVE** — I will start the next project immediately.\n2. Reply **WAIT** — I will wait and build one project tomorrow morning.\n\nAny other reply is treated as feedback only and will not start a project.\n\nThanks,\nDaily DevOps Builder"
