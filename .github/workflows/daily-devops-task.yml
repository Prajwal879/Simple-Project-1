name: Autonomous Daily DevOps Builder

on:
  schedule:
    # 03:30 UTC is 09:00 India Standard Time.
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Test the agent and repository
        run: python -m unittest discover -s tests -v

      - name: Complete today's task
        id: task
        shell: bash
        run: |
          python auto_builder.py | tee task-output.txt
          cat task-output.txt >> "$GITHUB_OUTPUT"

      - name: Commit completed work directly
        env:
          TASK_DATE: ${{ steps.task.outputs.TASK_DATE }}
          TASK_TITLE: ${{ steps.task.outputs.TASK_TITLE }}
        shell: bash
        run: |
          rm task-output.txt
          git config user.name "daily-devops-builder[bot]"
          git config user.email "daily-devops-builder[bot]@users.noreply.github.com"
          git add completed-work
          git commit -m "feat: complete ${TASK_TITLE} for ${TASK_DATE}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Send morning work update through GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          TASK_DATE: ${{ steps.task.outputs.TASK_DATE }}
          TASK_TITLE: ${{ steps.task.outputs.TASK_TITLE }}
          TASK_SUMMARY: ${{ steps.task.outputs.TASK_SUMMARY }}
          TASK_PATH: ${{ steps.task.outputs.TASK_PATH }}
        shell: bash
        run: |
          gh issue create \
            --title "☀️ Daily update: ${TASK_TITLE} completed" \
            --assignee "${{ github.repository_owner }}" \
            --body "Good morning! The autonomous DevOps Builder completed today's small task.\n\n**Work completed:** ${TASK_TITLE}\n\n${TASK_SUMMARY}\n\n**Files:** [${TASK_PATH}](https://github.com/${{ github.repository }}/tree/${{ github.event.repository.default_branch }}/${TASK_PATH})\n\n**Quality check:** All automated tests passed before the change was committed.\n\n_Date: ${TASK_DATE}_"
