name: Test Uptime Checker

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Demonstrate uptime check
        run: python uptime_checker.py https://example.com
