apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-web
spec:
  replicas: 1
  selector:
    matchLabels: {app: healthy-web}
  template:
    metadata:
      labels: {app: healthy-web}
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: {path: /, port: 80}
          livenessProbe:
            httpGet: {path: /, port: 80}
